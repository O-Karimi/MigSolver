{% extends "base.html" %}

{% block content %}
    <a href="{% url 'wiki:article_list' %}" style="color: #805ad5; text-decoration: none; font-weight: bold;">← Back to Knowledge Base</a>

    <h1 style="color: #2d3748; font-size: 2.5em; margin-bottom: 10px;">{{ article.title }}</h1>
    
    <div class="meta">
        Written by <strong>{{ article.author.username|default:"MigSolver Admin" }}</strong> • 
        Last verified on {{ article.last_updated|date:"F j, Y" }}
    </div>

    <div class="wiki-content">
        {{ article.content|linebreaks }}
    </div>
{% endblock %}
