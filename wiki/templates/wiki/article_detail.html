<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ article.title }} - MigSolver Wiki</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; color: #333; }
        .wiki-content { background: #f8fafc; padding: 30px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 20px; font-size: 1.1em; }
        .meta { color: #718096; font-size: 0.9em; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="{% url 'wiki:article_list' %}" style="color: #805ad5; text-decoration: none; font-weight: bold;">← Back to Knowledge Base</a>

    <h1 style="color: #2d3748; font-size: 2.5em; margin-bottom: 10px;">{{ article.title }}</h1>
    
    <div class="meta">
        Written by <strong>{{ article.author.username|default:"MigSolver Admin" }}</strong> • 
        Last verified on {{ article.last_updated|date:"F j, Y" }}
    </div>

    <div class="wiki-content">
        {{ article.content|linebreaks }}
    </div>
</body>
</html>
